                        concept: '<p>Real-time systems rely on a <strong class="highlight">Pre-emptive Scheduling OS</strong>. If a critical input arrives, the OS immediately pauses current background tasks to allocate CPU resources to the critical task. There are two main types:</p><ul class="list-decimal pl-5 space-y-1 mt-2"><li><strong>Hard Real-Time:</strong> Missing a deadline causes total system failure (e.g., Airbags).</li><li><strong>Soft Real-Time:</strong> Missing a deadline degrades quality but is acceptable (e.g., Video streaming).</li></ul>',

                        concept: '<p>Parallel systems feature <strong class="highlight">Tightly Coupled Processors</strong>. Because all cores reside on the same motherboard and share RAM, communication between them is near-instantaneous. However, theoretical speedup is limited by <strong>Amdahl\'s Law</strong>.</p><p class="text-center font-serif text-2xl bg-slate-50 border border-slate-200 rounded-xl p-4 my-4 shadow-sm">$$ \\text{Speedup} = \\frac{1}{(1 - P) + \\frac{P}{N}} $$</p><div class="bg-indigo-50 border-l-4 border-indigo-400 p-5 text-sm rounded-r-lg text-slate-700 shadow-sm"><p class="font-bold text-indigo-800 mb-3 text-base"><i class="fa-solid fa-utensils mr-2"></i> Making sense of the variables:</p><ul class="space-y-2"><li><strong class="text-indigo-600 bg-white px-2 py-0.5 rounded shadow-sm">P</strong> : The part of the task that <b>can be shared</b> (e.g., chopping 100 carrots).</li><li><strong class="text-indigo-600 bg-white px-2 py-0.5 rounded shadow-sm">1 - P</strong> : The part that <b>must wait sequentially</b> (e.g., waiting 30 mins for the soup to boil).</li><li><strong class="text-indigo-600 bg-white px-2 py-0.5 rounded shadow-sm">N</strong> : The <b>number of CPU Cores</b> (e.g., number of kitchen helpers).</li></ul><p class="mt-3 text-slate-600 italic">Conclusion: No matter how many helpers (N) you add to chop carrots (P), you still have to wait 30 minutes for the soup to boil (1 - P). This is why adding more cores doesn\'t mean infinitely faster speeds!</p></div>',

        let currentModeIndex = 0;
        let isAnimating = false;
        
        let quizState = { 
            active: false, 
            currentQ: 0, 
            answers: []
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            renderNav();
            loadMode(0);
            updateStaticText();
        });

        // --- Language Toggle ---
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            document.getElementById('langLabel').innerText = currentLang === 'en' ? '中文' : 'English';
            updateStaticText();
            renderNav();
            
            if (quizState.active) {
                renderQuizQuestion();
            } else {
                loadMode(currentModeIndex);
            }
        }

        function updateStaticText() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) {
                    el.innerHTML = i18n[currentLang][key];
                }
            });
            
            // Update Placeholders
            document.querySelectorAll('[data-placeholder]').forEach(el => {
                const key = el.getAttribute('data-placeholder');
                if(i18n[currentLang][key]){
                    el.setAttribute('placeholder', i18n[currentLang][key]);
                }
            });
        }

        function setDemoExplanation(key) {
            const text = i18n[currentLang][key];
            const el = document.getElementById('demoExplanation');
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerText = text;
                el.style.opacity = 1;
            }, 200);
        }

        // --- Navigation ---
        function renderNav() {
            const nav = document.getElementById('navMenu');
            nav.innerHTML = '';
            i18n[currentLang].modes.forEach((mode, index) => {
                const btn = document.createElement('button');
                const isActive = index === currentModeIndex && !quizState.active;
                
                btn.className = `w-full text-left px-5 py-4 rounded-xl transition-all flex items-center gap-4 mb-2 ${
                    isActive 
                    ? 'bg-indigo-600 text-white shadow-md font-bold' 
                    : 'text-slate-600 hover:bg-indigo-50 hover:text-indigo-700 font-medium'
                }`;
                btn.innerHTML = `<i class="fa-solid ${mode.icon} w-6 text-center text-xl"></i> <span class="text-[15px] leading-tight">${mode.title}</span>`;
                btn.onclick = () => {
                    if(isAnimating) return;
                    if(quizState.active) exitQuiz();
                    loadMode(index);
                };
                nav.appendChild(btn);
            });
        }

        // --- Content Loading ---
        function loadMode(index) {
            currentModeIndex = index;
            const mode = i18n[currentLang].modes[index];
            
            // Title & Descriptions
            document.getElementById('modeTitle').innerText = mode.title;
            document.getElementById('modeDesc').innerText = mode.desc;
            document.getElementById('modeConcept').innerHTML = mode.concept;
            document.getElementById('modeWhy').innerHTML = mode.why;
            document.getElementById('modeMisconception').innerHTML = mode.misconception;
            
            // Think & Link Data
            document.getElementById('modeThinkQ').innerText = mode.thinkQ;
            document.getElementById('modeThinkA').innerHTML = mode.thinkA;
            resetThinkLinkUI();

            const iconContainer = document.getElementById('modeIcon');
            iconContainer.innerHTML = `<i class="fa-solid ${mode.icon}"></i>`;
            
            renderNav();
            setupVisualization(mode.vizType);

            // Re-render MathJax formulas if present
            if(window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        // --- Think & Link Logic ---
        function resetThinkLinkUI() {
            const input = document.getElementById('thinkInput');
            const btn = document.getElementById('btnCompare');
            const answerBox = document.getElementById('teacherAnalysisBox');

            input.value = '';
            input.disabled = false;
            input.classList.remove('bg-slate-200', 'text-slate-500', 'border-slate-200');
            input.classList.add('bg-slate-50');
            
            btn.disabled = false;
            btn.classList.remove('hidden');

            answerBox.classList.add('hidden', 'opacity-0');
        }

        function revealTeacherAnalysis() {
            const input = document.getElementById('thinkInput');
            const btn = document.getElementById('btnCompare');
            const answerBox = document.getElementById('teacherAnalysisBox');

            // Lock Input
            input.disabled = true;
            input.classList.remove('bg-slate-50');
            input.classList.add('bg-slate-200', 'text-slate-500', 'border-slate-200');

            // Hide Button
            btn.classList.add('hidden');

            // Show Analysis
            answerBox.classList.remove('hidden');
            // Slight delay for fade in effect
            setTimeout(() => {
                answerBox.classList.remove('opacity-0');
            }, 50);
        }

        // --- Demo UI Helpers ---
        function showResetButton(type) {
            const controls = document.getElementById('controlsArea');
            const t = i18n[currentLang];
            const resetBtnId = 'btnResetDemo';
            if (!document.getElementById(resetBtnId)) {
                const btn = document.createElement('button');
                btn.id = resetBtnId;
                btn.className = "px-4 py-2 bg-slate-600 hover:bg-slate-700 text-white text-sm rounded-lg font-bold transition-colors shadow-sm fade-in";
                btn.innerHTML = `<i class="fa-solid fa-rotate-right mr-1"></i> ${t.btn_reset}`;
                btn.onclick = () => setupVisualization(type);
                controls.appendChild(btn);
            }
        }

        function updateButtonStates() {
            const mode = i18n[currentLang].modes[currentModeIndex].vizType;
            
            if (mode === 'batch') {
                const btnAdd = document.getElementById('btnBatchAdd');
                const btnProc = document.getElementById('btnBatchProc');
                if(btnAdd) btnAdd.disabled = isAnimating || batchTasks >= 6;
                if(btnProc) btnProc.disabled = isAnimating || batchTasks === 0;
            } else if (mode === 'realtime') {
                const btn = document.getElementById('btnRtTrigger');
                if(btn) btn.disabled = isAnimating;
            } else if (mode === 'parallel') {
                const btn = document.getElementById('btnParProc');
                if(btn) btn.disabled = isAnimating;
            } else if (mode === 'distributed') {
                const btn = document.getElementById('btnDistProc');
                if(btn) btn.disabled = isAnimating;
            } else if (mode === 'virtualisation') {
                const btn = document.getElementById('btnVmProc');
                if(btn) btn.disabled = isAnimating;
            }
        }

        function getRelativeCenter(element, container) {
            const elRect = element.getBoundingClientRect();
            const contRect = container.getBoundingClientRect();
            return {
                x: (elRect.left - contRect.left) + (elRect.width / 2),
                y: (elRect.top - contRect.top) + (elRect.height / 2)
            };
        }

        // --- Animation Logic ---

        // Batch
        let batchTasks = 0;
        function vizBatchAdd() {
            if(isAnimating || batchTasks >= 6) return;
            const q = document.getElementById('batchQueue');
            const task = document.createElement('div');
            task.className = 'w-full h-6 bg-indigo-500 rounded-md fade-in shadow-sm border border-indigo-600';
            q.appendChild(task);
            batchTasks++;
            setDemoExplanation('exp_batch_add');
            updateButtonStates();
        }
        
        function vizBatchProcess() {
            if(batchTasks === 0 || isAnimating) return;
            isAnimating = true;
            updateButtonStates();
            setDemoExplanation('exp_batch_proc');
            
            const q = document.getElementById('batchQueue');
            const proc = document.getElementById('batchProcessor');
            
            proc.classList.add('processing-active');
            
            let processed = 0;
            const total = batchTasks;
            
            const interval = setInterval(() => {
                const tasks = q.querySelectorAll('div');
                if(tasks.length > 0) {
                    q.removeChild(tasks[0]);
                    proc.style.backgroundColor = '#e0e7ff';
                    setTimeout(() => proc.style.backgroundColor = 'white', 200);
                    processed++;
                }
                if(processed >= total) {
                    clearInterval(interval);
                    batchTasks = 0;
                    proc.classList.remove('processing-active');
                    isAnimating = false;
                    updateButtonStates();
                    showResetButton('batch');
                }
            }, 600);
        }

        // Real-time
        function vizRealtimeTrigger() {
            if(isAnimating) return;
            isAnimating = true;
            updateButtonStates();
            setDemoExplanation('exp_rt_proc');
            
            const container = document.getElementById('rtContainer');
            const input = document.getElementById('rtInput');
            const proc = document.getElementById('rtProcessor');
            const output = document.getElementById('rtOutput');
            
            const blip = document.createElement('div');
            blip.className = 'absolute w-6 h-6 bg-amber-500 rounded-full z-20 shadow-lg';
            
            const startPos = getRelativeCenter(input, container);
            const midPos = getRelativeCenter(proc, container);
            const endPos = getRelativeCenter(output, container);

            blip.style.left = (startPos.x - 12) + 'px';
            blip.style.top = (startPos.y - 12) + 'px';
            blip.style.transition = 'all 0.15s linear';
            container.appendChild(blip);
            
            setTimeout(() => {
                blip.style.left = (midPos.x - 12) + 'px';
                blip.style.top = (midPos.y - 12) + 'px';
                proc.classList.add('bg-amber-200', 'border-amber-500');
                
                setTimeout(() => {
                    blip.style.left = (endPos.x - 12) + 'px';
                    blip.style.top = (endPos.y - 12) + 'px';
                    proc.classList.remove('bg-amber-200', 'border-amber-500');
                    
                    setTimeout(() => {
                        output.classList.add('bg-green-200', 'text-green-700');
                        blip.remove();
                        setTimeout(() => {
                            output.classList.remove('bg-green-200', 'text-green-700');
                            isAnimating = false;
                            updateButtonStates();
                            showResetButton('realtime');
                        }, 400);
                    }, 150);
                }, 200);
            }, 50);
        }

        // Parallel
        function vizParallelProcess() {
            if(isAnimating) return;
            isAnimating = true;
            updateButtonStates();
            setDemoExplanation('exp_par_proc');
            
            const container = document.getElementById('parContainer');
            const task = document.getElementById('parTask');
            const cores = document.getElementById('parCores').children;
            
            task.style.opacity = '0';
            
            const minis = [];
            const startPos = getRelativeCenter(task, container);

            for(let i=0; i<4; i++) {
                const m = document.createElement('div');
                m.className = 'absolute w-12 h-12 bg-emerald-500 rounded-lg flex items-center justify-center text-white text-sm font-bold z-20 shadow-md';
                m.innerText = `P${i+1}`;
                m.style.left = (startPos.x - 24) + 'px';
                m.style.top = (startPos.y - 24) + 'px';
                m.style.transition = 'all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1)';
                container.appendChild(m);
                minis.push(m);
            }
            
            setTimeout(() => {
                for(let i=0; i<4; i++) {
                    const core = cores[i];
                    const targetPos = getRelativeCenter(core, container);
                    
                    minis[i].style.left = (targetPos.x - 24) + 'px';
                    minis[i].style.top = (targetPos.y - 24) + 'px';
                    minis[i].style.transform = 'scale(0.6)';
                }
                
                setTimeout(() => {
                    for(let i=0; i<4; i++) {
                        cores[i].classList.add('bg-emerald-200', 'border-emerald-500');
                        minis[i].remove();
                    }
                    setTimeout(() => {
                        for(let i=0; i<4; i++) cores[i].classList.remove('bg-emerald-200', 'border-emerald-500');
                        isAnimating = false;
                        updateButtonStates();
                        showResetButton('parallel');
                    }, 800);
                }, 600);
            }, 50);
        }

        // Distributed
        function vizDistribute() {
            if(isAnimating) return;
            isAnimating = true;
            updateButtonStates();
            setDemoExplanation('exp_dist_proc');
            
            const container = document.getElementById('distContainer');
            const server = document.getElementById('distServer');
            const nodes = document.querySelectorAll('.dist-node');
            
            const serverPos = getRelativeCenter(server, container);
            let completed = 0;

            nodes.forEach((node, i) => {
                const packet = document.createElement('div');
                packet.className = 'absolute w-4 h-4 bg-purple-500 rounded-full z-20 shadow-md';
                packet.style.left = (serverPos.x - 8) + 'px';
                packet.style.top = (serverPos.y - 8) + 'px';
                packet.style.transition = 'all 0.8s ease-in-out';
                container.appendChild(packet);
                
                const nodePos = getRelativeCenter(node, container);

                setTimeout(() => {
                    packet.style.left = (nodePos.x - 8) + 'px';
                    packet.style.top = (nodePos.y - 8) + 'px';
                    
                    setTimeout(() => {
                        node.classList.add('bg-purple-100', 'border-purple-500');
                        packet.style.backgroundColor = '#10b981'; 
                        
                        setTimeout(() => {
                            packet.style.left = (serverPos.x - 8) + 'px';
                            packet.style.top = (serverPos.y - 8) + 'px';
                            node.classList.remove('bg-purple-100', 'border-purple-500');
                            
                            setTimeout(() => {
                                packet.remove();
                                completed++;
                                server.style.backgroundColor = '#065f46';
                                setTimeout(() => server.style.backgroundColor = '', 200);

                                if(completed === nodes.length) {
                                    isAnimating = false;
                                    updateButtonStates();
                                    showResetButton('distributed');
                                }
                            }, 800);
                        }, 600);
                    }, 800);
                }, i * 150);
            });
        }

        // Virtualisation
        function vizRunVMs() {
            if(isAnimating) return;
            isAnimating = true;
            updateButtonStates();
            setDemoExplanation('exp_vm_proc');
            
            const bars = document.querySelectorAll('.vm-progress');
            bars.forEach(bar => {
                bar.style.transition = 'none';
                bar.style.width = '0%';
            });
            
            setTimeout(() => {
                bars.forEach((bar, i) => {
                    bar.style.transition = `width ${1.5 + Math.random()*2}s ease-in-out`;
                    bar.style.width = '100%';
                });
                
                setTimeout(() => {
                    isAnimating = false;
                    updateButtonStates();
                    showResetButton('virtualisation');
                }, 3500);
            }, 50);
        }

        // --- Quiz Logic ---
        function startQuiz() {
            quizState.active = true;
            quizState.currentQ = 0;
            quizState.answers = new Array(i18n[currentLang].quiz.length).fill(null);
            
            document.getElementById('learningSection').classList.add('hidden');
            document.getElementById('quizSection').classList.remove('hidden');
            document.getElementById('quizNavControls').classList.remove('hidden');
            
            // Scroll to top
            document.getElementById('contentArea').scrollTop = 0;

            renderNav(); 
            renderQuizQuestion();
        }

        function exitQuiz() {
            quizState.active = false;
            document.getElementById('quizSection').classList.add('hidden');
            document.getElementById('learningSection').classList.remove('hidden');
            renderNav();
        }

        function navigateQuiz(dir) {
            quizState.currentQ += dir;
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            const container = document.getElementById('quizContent');
            const navControls = document.getElementById('quizNavControls');
            const progress = document.getElementById('quizProgress');
            const qList = i18n[currentLang].quiz;
            const t = i18n[currentLang];
            
            // Handle Results Screen
            if (quizState.currentQ >= qList.length) {
                navControls.classList.add('hidden');
                progress.innerText = t.quiz_finish;
                
                let score = 0;
                quizState.answers.forEach((ans, idx) => {
                    if (ans === qList[idx].answer) score++;
                });

                const isPerfect = score === qList.length;

                container.innerHTML = `
                    <div class="text-center py-10 fade-in">
                        <div class="text-7xl mb-6 ${isPerfect ? 'text-emerald-500' : 'text-indigo-500'}">
                            <i class="fa-solid ${isPerfect ? 'fa-trophy' : 'fa-medal'}"></i>
                        </div>
                        <h3 class="text-3xl font-bold text-slate-800 mb-3">${t.quiz_score} <span class="${isPerfect ? 'text-emerald-600' : 'text-indigo-600'}">${score} / ${qList.length}</span></h3>
                        <p class="text-slate-500 mb-8 text-lg">${isPerfect ? t.quiz_perfect_msg : t.quiz_good_msg}</p>
                        <div class="flex justify-center gap-4">
                            <button onclick="startQuiz()" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-800 rounded-xl font-bold transition-colors shadow-sm"><i class="fa-solid fa-rotate-right mr-2"></i>${t.quiz_retry}</button>
                            <button onclick="exitQuiz()" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors shadow-sm"><i class="fa-solid fa-book-open mr-2"></i>${t.quiz_back}</button>
                        </div>
                    </div>
                `;
                return;
            }

            // Render Question
            navControls.classList.remove('hidden');
            const qData = qList[quizState.currentQ];
            progress.innerText = `Question ${quizState.currentQ + 1} of ${qList.length}`;
            
            const hasAnswered = quizState.answers[quizState.currentQ] !== null;
            const selectedIdx = quizState.answers[quizState.currentQ];

            let html = `<div class="fade-in">
                <h3 class="text-2xl font-bold text-slate-800 mb-8 leading-relaxed">${quizState.currentQ + 1}. ${qData.q}</h3>
                <div class="space-y-4 mb-8">`;
            
            qData.options.forEach((opt, idx) => {
                let btnClass = "w-full text-left p-5 border-2 rounded-xl transition-all font-semibold text-lg text-slate-700 ";
                
                if (!hasAnswered) {
                    btnClass += "border-slate-200 hover:border-indigo-400 hover:bg-indigo-50 hover:shadow-sm cursor-pointer";
                } else {
                    btnClass += "cursor-default ";
                    if (idx === qData.answer) {
                        btnClass += "border-emerald-500 bg-emerald-50 text-emerald-800 shadow-sm"; 
                    } else if (idx === selectedIdx && selectedIdx !== qData.answer) {
                        btnClass += "border-rose-500 bg-rose-50 text-rose-800 shadow-sm"; 
                    } else {
                        btnClass += "border-slate-100 opacity-50"; 
                    }
                }

                html += `
                    <button ${hasAnswered ? 'disabled' : `onclick="answerQuestion(${idx})"`} class="${btnClass}">
                        <div class="flex items-center justify-between">
                            <span>${opt}</span>
                            ${hasAnswered && idx === qData.answer ? '<i class="fa-solid fa-circle-check text-emerald-500 text-2xl"></i>' : ''}
                            ${hasAnswered && idx === selectedIdx && selectedIdx !== qData.answer ? '<i class="fa-solid fa-circle-xmark text-rose-500 text-2xl"></i>' : ''}
                        </div>
                    </button>
                `;
            });
            html += `</div>`;

            // Explanation Box
            if (hasAnswered) {
                const isCorrect = selectedIdx === qData.answer;
                html += `
                    <div class="p-6 rounded-xl border ${isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'} fade-in shadow-sm">
                        <h4 class="font-bold mb-3 flex items-center gap-2 text-xl ${isCorrect ? 'text-emerald-800' : 'text-rose-800'}">
                            <i class="fa-solid ${isCorrect ? 'fa-check' : 'fa-xmark'}"></i>
                            ${isCorrect ? t.quiz_correct : t.quiz_incorrect}
                        </h4>
                        <p class="text-lg ${isCorrect ? 'text-emerald-900' : 'text-rose-900'} leading-relaxed">${qData.explanation}</p>
                    </div>
                `;
            }

            html += `</div>`;
            container.innerHTML = html;

            // Update Nav Buttons State
            document.getElementById('btnQuizPrev').disabled = quizState.currentQ === 0;
            document.getElementById('btnQuizPrev').className = quizState.currentQ === 0 
                ? "px-6 py-3 bg-slate-50 text-slate-400 rounded-xl font-bold cursor-not-allowed flex items-center gap-2"
                : "px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold transition-colors flex items-center gap-2";
            
            const btnNext = document.getElementById('btnQuizNext');
            if (quizState.currentQ === qList.length - 1) {
                btnNext.innerHTML = `<span data-i18n="quiz_finish">${t.quiz_finish}</span> <i class="fa-solid fa-flag-checkered"></i>`;
            } else {
                btnNext.innerHTML = `<span data-i18n="quiz_next">${t.quiz_next}</span> <i class="fa-solid fa-arrow-right"></i>`;
            }
            
            btnNext.className = hasAnswered 
                ? "px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors flex items-center gap-2 shadow-md"
                : "px-6 py-3 bg-indigo-300 text-white rounded-xl font-bold cursor-not-allowed flex items-center gap-2";
            btnNext.disabled = !hasAnswered;
        }

        function answerQuestion(selectedIdx) {
            quizState.answers[quizState.currentQ] = selectedIdx;
            renderQuizQuestion();
        }

    </script>
</body>
</html>
