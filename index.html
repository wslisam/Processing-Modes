        // --- Helper for accurate relative positioning ---
        function getRelativeCenter(element, container) {
            const elRect = element.getBoundingClientRect();
            const contRect = container.getBoundingClientRect();
            return {

                y: (elRect.top - contRect.top) + (elRect.height / 2)
            };

        // --- Animation Logic ---

        // Batch
        let batchTasks = 0;
        function vizBatchAdd() {
            if(isAnimating || batchTasks >= 6) return;
            const q = document.getElementById('batchQueue');
            const task = document.createElement('div');
            task.className = 'w-full h-6 bg-indigo-500 rounded-md fade-in shadow-sm border border-indigo-600';
            q.appendChild(task);
            batchTasks++;
            setDemoExplanation('exp_batch_add');
            updateButtonStates();
        }
        
        function vizBatchProcess() {
            if(batchTasks === 0 || isAnimating) return;
            isAnimating = true;
            updateButtonStates();
            setDemoExplanation('exp_batch_proc');
            
            const q = document.getElementById('batchQueue');
            const proc = document.getElementById('batchProcessor');
            
            proc.classList.add('processing-active');
            
            let processed = 0;
            const total = batchTasks;
            
            const interval = setInterval(() => {
                const tasks = q.querySelectorAll('div');
                if(tasks.length > 0) {
                    q.removeChild(tasks[0]);
                    proc.style.backgroundColor = '#e0e7ff';
                    setTimeout(() => proc.style.backgroundColor = 'white', 200);
                    processed++;
                }
                if(processed >= total) {
                    clearInterval(interval);
                    batchTasks = 0;
                    proc.classList.remove('processing-active');
                    isAnimating = false;
                    updateButtonStates();
                    showResetButton('batch');
                }
            }, 600);
        }

        // Real-time
        function vizRealtimeTrigger() {
            if(isAnimating) return;
            isAnimating = true;
            updateButtonStates();
            setDemoExplanation('exp_rt_proc');
            
            const container = document.getElementById('rtContainer');
            const input = document.getElementById('rtInput');
            const proc = document.getElementById('rtProcessor');
            const output = document.getElementById('rtOutput');
            
            const blip = document.createElement('div');
            blip.className = 'absolute w-6 h-6 bg-amber-500 rounded-full z-20 shadow-lg';
            
            const startPos = getRelativeCenter(input, container);
            const midPos = getRelativeCenter(proc, container);
            const endPos = getRelativeCenter(output, container);

            blip.style.left = (startPos.x - 12) + 'px';
            blip.style.top = (startPos.y - 12) + 'px';
            blip.style.transition = 'all 0.15s linear';
            container.appendChild(blip);
            
            setTimeout(() => {
                blip.style.left = (midPos.x - 12) + 'px';
                blip.style.top = (midPos.y - 12) + 'px';
                proc.classList.add('bg-amber-200', 'border-amber-500');
                
                setTimeout(() => {
                    blip.style.left = (endPos.x - 12) + 'px';
                    blip.style.top = (endPos.y - 12) + 'px';
                    proc.classList.remove('bg-amber-200', 'border-amber-500');
                    
                    setTimeout(() => {
                        output.classList.add('bg-green-200', 'text-green-700');
                        blip.remove();
                        setTimeout(() => {
                            output.classList.remove('bg-green-200', 'text-green-700');
                            isAnimating = false;
                            updateButtonStates();
                            showResetButton('realtime');
                        }, 400);
                    }, 150);
                }, 200);
            }, 50);
        }

        // Parallel
        function vizParallelProcess() {
            if(isAnimating) return;
            isAnimating = true;
            updateButtonStates();
            setDemoExplanation('exp_par_proc');
            
            const container = document.getElementById('parContainer');
            const task = document.getElementById('parTask');
            const cores = document.getElementById('parCores').children;
            
            task.style.opacity = '0';
            
            const minis = [];
            const startPos = getRelativeCenter(task, container);

            for(let i=0; i<4; i++) {
                const m = document.createElement('div');
                m.className = 'absolute w-12 h-12 bg-emerald-500 rounded-lg flex items-center justify-center text-white text-sm font-bold z-20 shadow-md';
                m.innerText = `Part ${i+1}`;
                m.style.left = (startPos.x - 24) + 'px';
                m.style.top = (startPos.y - 24) + 'px';
                m.style.transition = 'all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1)';
                container.appendChild(m);
                minis.push(m);
            }
            
            setTimeout(() => {
                for(let i=0; i<4; i++) {
                    const core = cores[i];
                    const targetPos = getRelativeCenter(core, container);
                    
                    minis[i].style.left = (targetPos.x - 24) + 'px';
                    minis[i].style.top = (targetPos.y - 24) + 'px';
                    minis[i].style.transform = 'scale(0.6)';
                }
                
                setTimeout(() => {
                    for(let i=0; i<4; i++) {
                        cores[i].classList.add('bg-emerald-200', 'border-emerald-500');
                        minis[i].remove();
                    }
                    setTimeout(() => {
                        for(let i=0; i<4; i++) cores[i].classList.remove('bg-emerald-200', 'border-emerald-500');
                        isAnimating = false;
                        updateButtonStates();
                        showResetButton('parallel');
                    }, 800);
                }, 600);
            }, 50);
        }

        // Distributed
        function vizDistribute() {
            if(isAnimating) return;
            isAnimating = true;
            updateButtonStates();
            setDemoExplanation('exp_dist_proc');
            
            const container = document.getElementById('distContainer');
            const server = document.getElementById('distServer');
            const nodes = document.querySelectorAll('.dist-node');
            
            const serverPos = getRelativeCenter(server, container);
            let completed = 0;

            nodes.forEach((node, i) => {
                const packet = document.createElement('div');
                packet.className = 'absolute w-4 h-4 bg-purple-500 rounded-full z-20 shadow-md';
                packet.style.left = (serverPos.x - 8) + 'px';
                packet.style.top = (serverPos.y - 8) + 'px';
                packet.style.transition = 'all 0.8s ease-in-out';
                container.appendChild(packet);
                
                const nodePos = getRelativeCenter(node, container);

                setTimeout(() => {
                    packet.style.left = (nodePos.x - 8) + 'px';
                    packet.style.top = (nodePos.y - 8) + 'px';
                    
                    setTimeout(() => {
                        node.classList.add('bg-purple-100', 'border-purple-500');
                        packet.style.backgroundColor = '#10b981'; 
                        
                        setTimeout(() => {
                            packet.style.left = (serverPos.x - 8) + 'px';
                            packet.style.top = (serverPos.y - 8) + 'px';
                            node.classList.remove('bg-purple-100', 'border-purple-500');
                            
                            setTimeout(() => {
                                packet.remove();
                                completed++;
                                server.style.backgroundColor = '#065f46';
                                setTimeout(() => server.style.backgroundColor = '', 200);

                                if(completed === nodes.length) {
                                    isAnimating = false;
                                    updateButtonStates();
                                    showResetButton('distributed');
                                }
                            }, 800);
                        }, 600);
                    }, 800);
                }, i * 150);
            });
        }

        // Virtualisation
        function vizRunVMs() {
            if(isAnimating) return;
            isAnimating = true;
            updateButtonStates();
            setDemoExplanation('exp_vm_proc');
            
            const bars = document.querySelectorAll('.vm-progress');
            bars.forEach(bar => {
                bar.style.transition = 'none';
                bar.style.width = '0%';
            });
            
            setTimeout(() => {
                bars.forEach((bar, i) => {
                    bar.style.transition = `width ${1.5 + Math.random()*2}s ease-in-out`;
                    bar.style.width = '100%';
                });
                
                setTimeout(() => {
                    isAnimating = false;
                    updateButtonStates();
                    showResetButton('virtualisation');
                }, 3500);
            }, 50);
        }

        // --- Quiz Logic ---
        function startQuiz() {
            quizState.active = true;
            quizState.currentQ = 0;
            quizState.answers = new Array(i18n[currentLang].quiz.length).fill(null);
            
            document.getElementById('learningSection').classList.add('hidden');
            document.getElementById('quizSection').classList.remove('hidden');
            document.getElementById('quizNavControls').classList.remove('hidden');
            renderNav(); 
            renderQuizQuestion();
        }

        function exitQuiz() {
            quizState.active = false;
            document.getElementById('quizSection').classList.add('hidden');
            document.getElementById('learningSection').classList.remove('hidden');
            renderNav();
        }

        function navigateQuiz(dir) {
            quizState.currentQ += dir;
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            const container = document.getElementById('quizContent');
            const navControls = document.getElementById('quizNavControls');
            const progress = document.getElementById('quizProgress');
            const qList = i18n[currentLang].quiz;
            const t = i18n[currentLang];
            
            // Handle Results Screen
            if (quizState.currentQ >= qList.length) {
                navControls.classList.add('hidden');
                progress.innerText = t.quiz_finish;
                
                let score = 0;
                quizState.answers.forEach((ans, idx) => {
                    if (ans === qList[idx].answer) score++;
                });

                const isPerfect = score === qList.length;

                container.innerHTML = `
                    <div class="text-center py-10 fade-in">
                        <div class="text-7xl mb-6 ${isPerfect ? 'text-emerald-500' : 'text-indigo-500'}">
                            <i class="fa-solid ${isPerfect ? 'fa-trophy' : 'fa-medal'}"></i>
                        </div>
                        <h3 class="text-3xl font-bold text-slate-800 mb-3">${t.quiz_score} <span class="${isPerfect ? 'text-emerald-600' : 'text-indigo-600'}">${score} / ${qList.length}</span></h3>
                        <p class="text-slate-500 mb-8 text-lg">${isPerfect ? t.quiz_perfect_msg : t.quiz_good_msg}</p>
                        <div class="flex justify-center gap-4">
                            <button onclick="startQuiz()" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-800 rounded-xl font-bold transition-colors shadow-sm"><i class="fa-solid fa-rotate-right mr-2"></i>${t.quiz_retry}</button>
                            <button onclick="exitQuiz()" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors shadow-sm"><i class="fa-solid fa-book-open mr-2"></i>${t.quiz_back}</button>
                        </div>
                    </div>
                `;
                return;
            }

            // Render Question
            navControls.classList.remove('hidden');
            const qData = qList[quizState.currentQ];
            progress.innerText = `Question ${quizState.currentQ + 1} of ${qList.length}`;
            
            const hasAnswered = quizState.answers[quizState.currentQ] !== null;
            const selectedIdx = quizState.answers[quizState.currentQ];

            let html = `<div class="fade-in">
                <h3 class="text-xl font-bold text-slate-800 mb-6 leading-relaxed">${quizState.currentQ + 1}. ${qData.q}</h3>
                <div class="space-y-3 mb-6">`;
            
            qData.options.forEach((opt, idx) => {
                let btnClass = "w-full text-left p-4 border-2 rounded-xl transition-all font-semibold text-slate-700 ";
                
                if (!hasAnswered) {
                    btnClass += "border-slate-200 hover:border-indigo-400 hover:bg-indigo-50 cursor-pointer";
                } else {
                    btnClass += "cursor-default ";
                    if (idx === qData.answer) {
                        btnClass += "border-emerald-500 bg-emerald-50 text-emerald-800"; 
                    } else if (idx === selectedIdx && selectedIdx !== qData.answer) {
                        btnClass += "border-red-500 bg-red-50 text-red-800"; 
                    } else {
                        btnClass += "border-slate-100 opacity-50"; 
                    }
                }

                html += `
                    <button ${hasAnswered ? 'disabled' : `onclick="answerQuestion(${idx})"`} class="${btnClass}">
                        <div class="flex items-center justify-between">
                            <span>${opt}</span>
                            ${hasAnswered && idx === qData.answer ? '<i class="fa-solid fa-circle-check text-emerald-500 text-xl"></i>' : ''}
                            ${hasAnswered && idx === selectedIdx && selectedIdx !== qData.answer ? '<i class="fa-solid fa-circle-xmark text-red-500 text-xl"></i>' : ''}
                        </div>
                    </button>
                `;
            });
            html += `</div>`;

            // Explanation Box
            if (hasAnswered) {
                const isCorrect = selectedIdx === qData.answer;
                html += `
                    <div class="p-5 rounded-xl border ${isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'} fade-in shadow-sm">
                        <h4 class="font-bold mb-2 flex items-center gap-2 text-lg ${isCorrect ? 'text-emerald-800' : 'text-red-800'}">
                            <i class="fa-solid ${isCorrect ? 'fa-check' : 'fa-xmark'}"></i>
                            ${isCorrect ? t.quiz_correct : t.quiz_incorrect}
                        </h4>
                        <p class="text-base ${isCorrect ? 'text-emerald-900' : 'text-red-900'} leading-relaxed">${qData.explanation}</p>
                    </div>
                `;
            }

            html += `</div>`;
            container.innerHTML = html;

            // Update Nav Buttons State
            document.getElementById('btnQuizPrev').disabled = quizState.currentQ === 0;
            document.getElementById('btnQuizPrev').className = quizState.currentQ === 0 
                ? "px-5 py-2.5 bg-slate-50 text-slate-400 rounded-lg font-semibold cursor-not-allowed flex items-center gap-2"
                : "px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-semibold transition-colors flex items-center gap-2";
            
            const btnNext = document.getElementById('btnQuizNext');
            if (quizState.currentQ === qList.length - 1) {
                btnNext.innerHTML = `<span data-i18n="quiz_finish">${t.quiz_finish}</span> <i class="fa-solid fa-flag-checkered"></i>`;
            } else {
                btnNext.innerHTML = `<span data-i18n="quiz_next">${t.quiz_next}</span> <i class="fa-solid fa-arrow-right"></i>`;
            }
            
            btnNext.className = hasAnswered 
                ? "px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold transition-colors flex items-center gap-2 shadow-md"
                : "px-5 py-2.5 bg-indigo-300 text-white rounded-lg font-semibold cursor-not-allowed flex items-center gap-2";
            btnNext.disabled = !hasAnswered;
        }

        function answerQuestion(selectedIdx) {
            quizState.answers[quizState.currentQ] = selectedIdx;
            renderQuizQuestion();
        }

    </script>
</body>
</html>
